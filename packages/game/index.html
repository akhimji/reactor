<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reactor</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        color: #c8c8c8;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow: hidden;
      }
      #game {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
      }
      #game canvas {
        display: block;
      }
      #debug-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 0.5rem 0.75rem;
        font-size: 12px;
        line-height: 1.4;
        color: #c8c8c8;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
      }
      #debug-overlay .col {
        white-space: pre;
      }
      #debug-overlay .col.right {
        text-align: right;
      }
      #instructions-overlay {
        position: absolute;
        top: 3rem;
        left: 50%;
        transform: translateX(-50%);
        padding: 0.75rem 1rem;
        font-size: 13px;
        line-height: 1.5;
        color: #c8c8c8;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #333;
        white-space: pre;
        text-align: center;
        pointer-events: none;
        opacity: 1;
        transition: opacity 500ms ease-out;
      }
      #instructions-overlay.hidden {
        opacity: 0;
      }
      #restart-button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 0.75rem 1.5rem;
        font: inherit;
        font-size: 16px;
        color: #c8c8c8;
        background: #000;
        border: 1px solid #c8c8c8;
        cursor: pointer;
      }
      #restart-button:hover {
        background: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
